<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أفلان ❤️ أفلانة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --space-blue: #00f2ff;
            --space-purple: #bc13fe;
            --glow-color: rgba(0, 242, 255, 0.8);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: url('space_bg.jpg'); 
            background-color: #020205;
            background-size: cover;
            background-position: center;
            font-family: 'Tajawal', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7); 
            z-index: -1;
        }

        .container {
            text-align: center;
            background: rgba(15, 15, 35, 0.85);
            backdrop-filter: blur(15px);
            padding: 30px 20px;
            border-radius: 35px;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.4);
            border: 1px solid rgba(0, 242, 255, 0.3);
            z-index: 10;
        }

        /* تعديل: الصور كبيرة وليست دائرية */
        .image-box {
            width: 280px; /* حجم كبير */
            height: 280px; /* حجم كبير */
            border-radius: 25px; /* زوايا منحنية بسيطة */
            margin: 0 auto 25px auto;
            background-size: cover;
            background-position: center;
            border: 3px solid #fff;
            box-shadow: 0 0 25px var(--space-blue); /* إشعاع قوي */
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .img1 { background-image: url('img1.jpg'); }
        .img2 { background-image: url('img2.jpg'); }
        .img3 { background-image: url('img3.jpg'); }
        .img4 { background-image: url('img4.jpg'); }
        .img5 { background-image: url('img5.jpg'); }
        .img6 { background-image: url('img6.jpg'); }

        #display-text {
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 25px;
            min-height: 4.5rem;
            text-shadow: 0 0 10px var(--space-blue);
            line-height: 1.6;
        }

        .btn {
            background: linear-gradient(45deg, var(--space-purple), var(--space-blue));
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px var(--space-purple);
            transition: 0.3s;
        }

        .btn:hover { transform: scale(1.05); box-shadow: 0 0 25px var(--space-blue); }

        /* نظام النجوم */
        .star {
            position: absolute;
            pointer-events: none;
            font-size: 22px;
            z-index: 9999;
            animation: starFade 1.3s ease-out forwards;
        }

        @keyframes starFade {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0) rotate(180deg); opacity: 0; }
        }

        .hidden { display: none; }

        .final-card {
            background: rgba(10, 10, 30, 0.95);
            padding: 40px 20px;
            border-radius: 35px;
            border: 2px solid var(--space-blue);
            box-shadow: 0 0 50px var(--space-purple);
            text-align: center;
            color: white;
            width: 85%;
            max-width: 350px;
        }
    </style>
</head>
<body>

<audio id="player" loop>
    <source src="space_song.mp3" type="audio/mpeg">
</audio>

<div class="container" id="main-container">
    <div id="image-frame" class="image-box img1"></div>
    <div id="display-text"></div>
    <div id="btn-container">
        <button class="btn" id="action-btn" onclick="nextStep()">أهلاً أفلانة.. 🚀</button>
    </div>
</div>

<div id="final-screen" class="hidden" style="position: fixed; inset:0; display:flex; justify-content:center; align-items:center; background:rgba(0,0,0,0.8); z-index:100;">
    <div class="final-card">
        <div class="image-box img6" style="width:220px; height:220px; border-radius: 20px;"></div>
        <h2 style="color: var(--space-blue); margin-top:15px;">أحبكِ يا نجمتي ❤️</h2>
        <p style="font-size: 1.1rem;">من أفلان.. إلى أبعد نقطة في الكون</p>
        <button class="btn" style="margin-top:20px;" onclick="location.reload()">أحبك مجدداً 🔄</button>
    </div>
</div>

<script>
    const player = document.getElementById('player');
    
    function playMusic() {
        player.play().catch(() => {});
    }

    function createStars(x, y) {
        for (let i = 0; i < 10; i++) {
            const s = document.createElement('div');
            s.innerHTML = i % 2 === 0 ? '✨' : '🌟';
            s.className = 'star';
            s.style.left = x + 'px';
            s.style.top = y + 'px';
            const tx = (Math.random() - 0.5) * 400;
            const ty = (Math.random() - 0.5) * 400;
            s.style.setProperty('--tx', `${tx}px`);
            s.style.setProperty('--ty', `${ty}px`);
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 1300);
        }
    }

    document.addEventListener('mousedown', (e) => { createStars(e.clientX, e.clientY); playMusic(); });
    document.addEventListener('touchstart', (e) => { createStars(e.touches[0].clientX, e.touches[0].clientY); playMusic(); });

    let step = 0;
    const content = [
        { t: "أفلانة.. تدرين إن السماء الليلة طالعة كلش حلوة؟", i: "img1", b: "ليش يا أفلان؟" },
        { t: "لأنها تحاول تقلد لمعة عيونج، بس طبعاً ما تگدر!", i: "img2", b: "يا روحي 🤭" },
        { t: "أنتِ مو مجرد شخص عادي.. أنتِ كوكبي اللي يضوي دنياي", i: "img3", b: "وأنت سندي ❤️" },
        { t: "لو خيروني بين كل نجوم المجرة وبينج أنتِ..", i: "img4", b: "شنو تختار؟" },
        { t: "راح أختار أفلانة وأعوف الكون كله بظلامه!", i: "img5", b: "أحبك أفلان" },
        { t: "تعالي نسافر بين النجوم على هذا اللحن..", i: "img6", b: "يلا 🎵" }
    ];

    function typeEffect(text, callback) {
        let i = 0;
        const el = document.getElementById('display-text');
        el.innerHTML = "";
        function type() {
            if (i < text.length) {
                el.innerHTML += text.charAt(i);
                i++; setTimeout(type, 60);
            } else if (callback) callback();
        }
        type();
    }

    function nextStep() {
        playMusic();
        if (step >= content.length) {
            document.getElementById('main-container').classList.add('hidden');
            document.getElementById('final-screen').classList.remove('hidden');
            return;
        }
        const data = content[step];
        const btn = document.getElementById('action-btn');
        btn.style.opacity = '0';
        setTimeout(() => {
            document.getElementById('image-frame').className = "image-box " + data.i;
            typeEffect(data.t, () => {
                btn.innerText = data.b;
                btn.style.opacity = '1';
            });
        }, 300);
        step++;
    }

    window.onload = () => { setTimeout(nextStep, 500); };
</script>
</body>
</html>
